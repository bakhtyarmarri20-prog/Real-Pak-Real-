<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ایڈمن پینل - Admin Panel</title>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --bg-card-light: #334155;
            --border-glow: #3b82f6;
            --accent-gold: #f59e0b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            padding: 16px 16px 32px 16px;
            direction: rtl; /* لائیو سپورٹ برائے اردو */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .title {
            font-size: 22px;
            color: var(--accent-gold);
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        button {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
        }

        button:hover {
            background: var(--bg-card-light);
        }

        .tab-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .tab-btn {
            flex: 1;
            background: var(--bg-card);
            color: var(--text-main);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--bg-card-light);
            border: 1.5px solid var(--accent-gold);
            color: var(--accent-gold);
        }

        .search-bar {
            width: 100%;
            padding: 10px;
            background: var(--bg-deep);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--text-main);
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        .card-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-row, .match-row {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .row-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .user-email {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        .stat-card {
            background: var(--bg-deep);
            border: 1px solid var(--border-glow);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }

        .action-btns {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .tiny-btn {
            background: var(--bg-card-light);
            color: var(--text-main);
            font-size: 10px;
            padding: 5px 8px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            color: var(--text-dim);
            padding: 20px;
            font-size: 13px;
        }

        .toast {
            position: fixed;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 10px 18px;
            border-radius: 10px;
            z-index: 50;
            white-space: nowrap;
            display: none;
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast">پیغام یہاں دیکھے گا</div>

    <div class="header">
        <div class="title">🛠️ ایڈمن پینل</div>
        <div class="btn-group">
            <button onclick="showToast('ڈیش بورڈ پر جا رہے ہیں...')">ڈیش بورڈ</button>
            <button onclick="showToast('لاگ آؤٹ ہو گیا')">خارج ہوں</button>
        </div>
    </div>

    <div class="tab-row">
        <button id="users-tab-btn" class="tab-btn active" onclick="switchTab('users')">یوزرز (Users)</button>
        <button id="matches-tab-btn" class="tab-btn" onclick="switchTab('matches')">لائیو میچز (Matches)</button>
    </div>

    <div id="users-section">
        <input type="text" id="search-input" class="search-bar" placeholder="یوزر تلاش کریں..." oninput="filterUsers()">
        <div id="users-list" class="card-list">
            </div>
    </div>

    <div id="matches-section" style="display: none;">
        <div id="matches-list" class="card-list">
            </div>
    </div>

    <script>
        // فرضی ڈیٹا (آپ اسے اپنے API سے بھی جوڑ سکتے ہیں)
        let usersData = [
            { id: 'u_1', username: 'Ali Khan', role: 'admin', isBanned: false, email: 'ali@email.com', coins: 5000, gamesPlayed: 25, gamesWon: 15 },
            { id: 'u_2', username: 'Zeeshan', role: 'user', isBanned: true, email: 'zee@email.com', coins: 1200, gamesPlayed: 10, gamesWon: 3 }
        ];

        let matchesData = [
            { id: 'm_1', mode: 'Ludo Classic', betAmount: 500, status: 'active', players: ['Ali Khan', 'Zeeshan'] }
        ];

        // ٹوسٹ میسیج دکھانے کا فنکشن
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        // ٹیب تبدیل کرنے کا فنکشن
        function switchTab(tab) {
            if(tab === 'users') {
                document.getElementById('users-tab-btn').classList.add('active');
                document.getElementById('matches-tab-btn').classList.remove('active');
                document.getElementById('users-section').style.display = 'block';
                document.getElementById('matches-section').style.display = 'none';
                renderUsers(usersData);
            } else {
                document.getElementById('matches-tab-btn').classList.add('active');
                document.getElementById('users-tab-btn').classList.remove('active');
                document.getElementById('users-section').style.display = 'none';
                document.getElementById('matches-section').style.display = 'block';
                renderMatches();
            }
        }

        // یوزرز کو اسکرین پر دکھانے کا فنکشن
        function renderUsers(users) {
            const listContainer = document.getElementById('users-list');
            listContainer.innerHTML = '';

            if(users.length === 0) {
                listContainer.innerHTML = '<div class="empty">کوئی یوزر نہیں ملا</div>';
                return;
            }

            users.forEach(u => {
                const userRow = document.createElement('div');
                userRow.className = 'user-row';
                userRow.innerHTML = `
                    <div class="row-header">
                        <strong>${u.username} ${u.role === 'admin' ? '👑' : ''} ${u.isBanned ? '(بلاکڈ)' : ''}</strong>
                    </div>
                    <div class="user-email">${u.email}</div>
                    <div>🪙 ${u.coins.toLocaleString()} | 🎮 میچز: ${u.gamesPlayed} | 🏆 جیتے: ${u.gamesWon}</div>
                    <div class="action-btns">
                        <button class="tiny-btn" onclick="adjustCoins('${u.id}', 1000)">+1000 کوائنز</button>
                        <button class="tiny-btn" onclick="adjustCoins('${u.id}', -1000)">-1000 کوائنز</button>
                        <button class="tiny-btn" onclick="toggleBan('${u.id}')">${u.isBanned ? 'ان بلاک کریں' : 'بلاک کریں'}</button>
                    </div>
                `;
                listContainer.appendChild(userRow);
            });
        }

        // میچز کو اسکرین پر دکھانے کا فنکشن
        function renderMatches() {
            const listContainer = document.getElementById('matches-list');
            listContainer.innerHTML = '';

            if(matchesData.length === 0) {
                listContainer.innerHTML = '<div class="empty">کوئی لائیو میچ نہیں</div>';
                return;
            }

            matchesData.forEach(m => {
                const matchRow = document.createElement('div');
                matchRow.className = 'match-row';
                matchRow.innerHTML = `
                    <div class="row-header">
                        <strong>${m.mode.toUpperCase()}</strong>
                        <span>${m.status === 'active' ? 'جاری 🟢' : 'انتظار 🟡'}</span>
                    </div>
                    <div>💰 رقم: ${m.betAmount} کوائنز</div>
                    <div style="font-size:12px; color:var(--text-dim); margin-top:4px;">👥 کھلاڑی: ${m.players.join(' vs ')}</div>
                `;
                listContainer.appendChild(matchRow);
            });
        }

        // سرچ فلٹر
        function filterUsers() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = usersData.filter(u => u.username.toLowerCase().includes(query) || u.email.toLowerCase().includes(query));
            renderUsers(filtered);
        }

        // کوائنز ایڈجسٹ کرنے کی لاجک
        function adjustCoins(id, amount) {
            const user = usersData.find(u => u.id === id);
            if(user) {
                user.coins += amount;
                showToast(`${user.username} کے کوائنز اپڈیٹ کر دیے گئے`);
                filterUsers();
            }
        }

        // بلاک / ان بلاک لاجک
        function toggleBan(id) {
            const user = usersData.find(u => u.id === id);
            if(user) {
                user.isBanned = !user.isBanned;
                showToast(`${user.username} کا اسٹیٹس تبدیل کر دیا گیا`);
                filterUsers();
            }
        }

        // پہلی بار پیج لوڈ ہونے پر یوزرز دکھائیں
        renderUsers(usersData);
    </script>
</body>
</html>
